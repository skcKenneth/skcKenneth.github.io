<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Three experimental responses to weak identifiability</title>
  <desc id="desc">Three panels compare adding replicates in the same narrow range, extending the measurement range, and measuring a new observable. The first reduces noise but preserves the ridge; the latter two add new information.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#111"/></marker>
    <style>
      .t{fill:#111;font-family:Arial,Helvetica,sans-serif}.h{font-size:18px;font-weight:700}.s{font-size:15px}.axis{stroke:#111;stroke-width:1.6}.curve{fill:none;stroke:#1f6652;stroke-width:3}.alt{fill:none;stroke:#a24b32;stroke-width:3;stroke-dasharray:8 6}.pt{fill:#111}.box{fill:#f7f7f7;stroke:#777;stroke-width:1.5}.good{fill:#dce9e3;stroke:#1f6652;stroke-width:2}.warn{fill:#f3e5df;stroke:#a24b32;stroke-width:2}.arrow{stroke:#111;stroke-width:1.7;fill:none;marker-end:url(#arr)}
    </style>
  </defs>
  <rect width="960" height="540" fill="#fff"/>
  <text class="t h" x="36" y="42">Design the next observation where candidate models disagree</text>
  <rect class="box" x="35" y="75" width="280" height="390"/><text class="t h" x="55" y="108">(a) More replicates, same range</text>
  <line class="axis" x1="68" y1="292" x2="278" y2="292"/><line class="axis" x1="68" y1="145" x2="68" y2="292"/><path class="curve" d="M68 288 C108 269 128 231 152 195 C181 158 221 146 278 140"/><path class="alt" d="M68 288 C108 269 128 231 152 195 C181 158 221 146 278 140"/>
  <circle class="pt" cx="86" cy="282" r="3"/><circle class="pt" cx="91" cy="279" r="3"/><circle class="pt" cx="96" cy="276" r="3"/><circle class="pt" cx="112" cy="262" r="3"/><circle class="pt" cx="117" cy="258" r="3"/><circle class="pt" cx="122" cy="253" r="3"/><circle class="pt" cx="138" cy="225" r="3"/><circle class="pt" cx="143" cy="218" r="3"/><circle class="pt" cx="148" cy="208" r="3"/>
  <rect class="warn" x="61" y="325" width="228" height="86"/><text class="t s" x="78" y="352">Noise falls, but the same</text><text class="t s" x="78" y="375">parameter combination</text><text class="t s" x="78" y="398">still determines the slope.</text><text class="t s" x="175" y="444" text-anchor="middle" font-weight="700">Ridge persists</text>
  <rect class="box" x="340" y="75" width="280" height="390"/><text class="t h" x="360" y="108">(b) Extend the input range</text>
  <line class="axis" x1="373" y1="292" x2="583" y2="292"/><line class="axis" x1="373" y1="145" x2="373" y2="292"/><path class="curve" d="M373 288 C413 269 433 231 457 195 C486 158 526 146 583 140"/><path class="alt" d="M373 288 C413 269 433 231 457 195 C484 161 516 135 583 118"/>
  <circle class="pt" cx="391" cy="282" r="4"/><circle class="pt" cx="428" cy="244" r="4"/><circle class="pt" cx="467" cy="182" r="4"/><circle class="pt" cx="521" cy="151" r="4"/><circle class="pt" cx="574" cy="141" r="4"/><line x1="496" y1="124" x2="496" y2="292" stroke="#111" stroke-dasharray="5 5"/><text class="t s" x="535" y="314" text-anchor="middle">new regime</text>
  <rect class="good" x="366" y="325" width="228" height="86"/><text class="t s" x="383" y="352">Saturation separates</text><text class="t s" x="383" y="375">parameter pairs that were</text><text class="t s" x="383" y="398">similar near the origin.</text><text class="t s" x="480" y="444" text-anchor="middle" font-weight="700">Practical uncertainty contracts</text>
  <rect class="box" x="645" y="75" width="280" height="390"/><text class="t h" x="665" y="108">(c) Measure a new observable</text>
  <rect x="683" y="150" width="78" height="52" rx="2" fill="#dce9e3" stroke="#1f6652" stroke-width="2"/><text class="t s" x="722" y="181" text-anchor="middle">output y1</text><rect x="809" y="150" width="78" height="52" rx="2" fill="#f3e5df" stroke="#a24b32" stroke-width="2"/><text class="t s" x="848" y="181" text-anchor="middle">output y2</text><path class="arrow" d="M761 176 L803 176"/>
  <ellipse cx="737" cy="262" rx="66" ry="20" transform="rotate(-25 737 262)" fill="none" stroke="#1f6652" stroke-width="3"/><ellipse cx="830" cy="262" rx="66" ry="20" transform="rotate(25 830 262)" fill="none" stroke="#a24b32" stroke-width="3"/><circle cx="783" cy="259" r="7" fill="#111"/><text class="t s" x="783" y="303" text-anchor="middle">intersection identifies the pair</text>
  <rect class="good" x="671" y="325" width="228" height="86"/><text class="t s" x="688" y="352">A new output can break</text><text class="t s" x="688" y="375">a compensating parameter</text><text class="t s" x="688" y="398">relationship.</text><text class="t s" x="785" y="444" text-anchor="middle" font-weight="700">Structural ambiguity can change</text>
  <text class="t s" x="480" y="510" text-anchor="middle">Replicates improve precision; new regimes and observables improve discrimination.</text>
</svg>
