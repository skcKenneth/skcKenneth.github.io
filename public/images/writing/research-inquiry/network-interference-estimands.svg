<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Network interference changes the treatment contrast</title>
  <desc id="desc">Panel a shows direct treatment and spillover paths on a small network. Panel b compares a naive treated-minus-untreated contrast with the direct and all-treated policy effects in a synthetic example.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#111"/></marker>
    <style>
      .t{fill:#111;font-family:Arial,Helvetica,sans-serif}.h{font-size:20px;font-weight:700}.s{font-size:15px}.axis{stroke:#111;stroke-width:1.8}.edge{stroke:#909090;stroke-width:2.2}.spill{stroke:#a24b32;stroke-width:3;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}.direct{stroke:#1f6652;stroke-width:3;fill:none;marker-end:url(#arrow)}.treated{fill:#dce9e3;stroke:#1f6652;stroke-width:3}.untreated{fill:#fff;stroke:#111;stroke-width:2.2}.bar1{fill:#d7d7d7;stroke:#777}.bar2{fill:#dce9e3;stroke:#1f6652}.bar3{fill:#f3e5df;stroke:#a24b32}.grid{stroke:#d0d0d0;stroke-width:1}
    </style>
  </defs>
  <rect width="960" height="540" fill="#fff"/>
  <text class="t h" x="34" y="42">(a) Direct and spillover pathways</text>
  <line class="edge" x1="104" y1="168" x2="220" y2="115"/><line class="edge" x1="104" y1="168" x2="224" y2="238"/><line class="edge" x1="220" y1="115" x2="355" y2="165"/><line class="edge" x1="224" y1="238" x2="355" y2="165"/><line class="edge" x1="224" y1="238" x2="362" y2="300"/><line class="edge" x1="355" y1="165" x2="435" y2="263"/><line class="edge" x1="362" y1="300" x2="435" y2="263"/>
  <circle class="treated" cx="104" cy="168" r="22"/><circle class="untreated" cx="220" cy="115" r="22"/><circle class="untreated" cx="224" cy="238" r="22"/><circle class="treated" cx="355" cy="165" r="22"/><circle class="untreated" cx="362" cy="300" r="22"/><circle class="untreated" cx="435" cy="263" r="22"/>
  <text class="t s" x="104" y="174" text-anchor="middle" font-weight="700">T</text><text class="t s" x="220" y="121" text-anchor="middle">U</text><text class="t s" x="224" y="244" text-anchor="middle">U</text><text class="t s" x="355" y="171" text-anchor="middle" font-weight="700">T</text><text class="t s" x="362" y="306" text-anchor="middle">U</text><text class="t s" x="435" y="269" text-anchor="middle">U</text>
  <path class="direct" d="M86 126 C69 105 68 83 84 65"/><text class="t s" x="40" y="56">direct effect on T</text>
  <path class="spill" d="M119 188 C144 212 170 226 197 234"/><text class="t s" x="68" y="279">spillover to neighbour</text>
  <rect x="63" y="350" width="394" height="112" fill="#f7f7f7" stroke="#777" stroke-width="1.5"/>
  <text class="t s" x="83" y="380" font-weight="700">Observed outcome mixes two exposures</text>
  <text class="t s" x="83" y="408">own assignment z(i) + treated-neighbour fraction E(i)</text>
  <text class="t s" x="83" y="438">T = treated unit; U = untreated unit</text>
  <text class="t h" x="510" y="42">(b) Contrasts target different questions</text>
  <line class="grid" x1="575" y1="122" x2="914" y2="122"/><line class="grid" x1="575" y1="188" x2="914" y2="188"/><line class="grid" x1="575" y1="254" x2="914" y2="254"/><line class="grid" x1="575" y1="320" x2="914" y2="320"/><line class="grid" x1="575" y1="386" x2="914" y2="386"/>
  <line class="axis" x1="575" y1="386" x2="914" y2="386"/><line class="axis" x1="575" y1="88" x2="575" y2="386"/>
  <rect class="bar1" x="618" y="328" width="58" height="58"/><rect class="bar2" x="724" y="280" width="58" height="106"/><rect class="bar3" x="830" y="121" width="58" height="265"/>
  <text class="t h" x="647" y="315" text-anchor="middle">1.1</text><text class="t h" x="753" y="267" text-anchor="middle">2.0</text><text class="t h" x="859" y="108" text-anchor="middle">5.0</text>
  <text class="t s" x="647" y="414" text-anchor="middle">naive</text><text class="t s" x="647" y="434" text-anchor="middle">difference</text>
  <text class="t s" x="753" y="414" text-anchor="middle">direct</text><text class="t s" x="753" y="434" text-anchor="middle">effect</text>
  <text class="t s" x="859" y="414" text-anchor="middle">all-treated</text><text class="t s" x="859" y="434" text-anchor="middle">policy effect</text>
  <text class="t s" x="520" y="245" text-anchor="middle" transform="rotate(-90 520 245)">Synthetic outcome contrast</text>
  <text class="t s" x="744" y="486" text-anchor="middle">Same response law; different estimands and exposure patterns.</text>
</svg>
