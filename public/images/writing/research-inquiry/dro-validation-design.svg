<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">A predeclared validation design for distributionally robust decisions</title>
  <desc id="desc">A workflow separates training data, ambiguity-set calibration, optimization, and held-out regime testing. Four output measures compare nominal performance, shifted regret, reliability, and decision sensitivity.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#111"/></marker>
    <style>
      .t{fill:#111;font-family:Arial,Helvetica,sans-serif}.h{font-size:20px;font-weight:700}.s{font-size:15px}.box{fill:#f7f7f7;stroke:#777;stroke-width:1.5}.focus{fill:#dce9e3;stroke:#1f6652;stroke-width:2}.test{fill:#f3e5df;stroke:#a24b32;stroke-width:2}.arrow{stroke:#111;stroke-width:1.8;fill:none;marker-end:url(#arr)}.line{stroke:#777;stroke-width:1.5;fill:none}
    </style>
  </defs>
  <rect width="960" height="540" fill="#fff"/>
  <text class="t h" x="36" y="42">Separate ambiguity-set construction from the test shifts</text>
  <rect class="box" x="36" y="86" width="166" height="104"/><rect class="focus" x="232" y="86" width="210" height="104"/><rect class="box" x="472" y="86" width="166" height="104"/><rect class="test" x="668" y="86" width="256" height="104"/>
  <text class="t h" x="119" y="119" text-anchor="middle">Training data</text><text class="t s" x="119" y="150" text-anchor="middle">fit nominal model</text><text class="t s" x="119" y="172" text-anchor="middle">vary sample size</text>
  <text class="t h" x="337" y="119" text-anchor="middle">Calibrate ambiguity set</text><text class="t s" x="337" y="150" text-anchor="middle">geometry + radius chosen</text><text class="t s" x="337" y="172" text-anchor="middle">without test outcomes</text>
  <text class="t h" x="555" y="119" text-anchor="middle">Optimize</text><text class="t s" x="555" y="150" text-anchor="middle">nominal, DRO, and</text><text class="t s" x="555" y="172" text-anchor="middle">simple stress baseline</text>
  <text class="t h" x="796" y="119" text-anchor="middle">Held-out regimes</text><text class="t s" x="796" y="150" text-anchor="middle">nominal + tail, skew,</text><text class="t s" x="796" y="172" text-anchor="middle">dependence, regime shift</text>
  <path class="arrow" d="M202 138 H224"/><path class="arrow" d="M442 138 H464"/><path class="arrow" d="M638 138 H660"/>
  <text class="t h" x="36" y="252">Evaluate the same decisions with two performance ledgers</text>
  <path class="line" d="M796 190 V230 H236 V277"/>
  <rect class="focus" x="36" y="278" width="404" height="92"/><rect class="test" x="520" y="278" width="404" height="92"/>
  <text class="t h" x="238" y="312" text-anchor="middle">Nominal ledger</text><text class="t s" x="238" y="340" text-anchor="middle">expected cost paid under the fitted distribution</text>
  <text class="t h" x="722" y="312" text-anchor="middle">Shift ledger</text><text class="t s" x="722" y="340" text-anchor="middle">regret and bound failures under independent shifts</text>
  <rect class="box" x="36" y="414" width="204" height="84"/><rect class="box" x="264" y="414" width="204" height="84"/><rect class="box" x="492" y="414" width="204" height="84"/><rect class="box" x="720" y="414" width="204" height="84"/>
  <text class="t h" x="138" y="447" text-anchor="middle">Nominal cost</text><text class="t s" x="138" y="476" text-anchor="middle">price of protection</text>
  <text class="t h" x="366" y="447" text-anchor="middle">Shifted regret</text><text class="t s" x="366" y="476" text-anchor="middle">out-of-sample loss</text>
  <text class="t h" x="594" y="447" text-anchor="middle">Reliability</text><text class="t s" x="594" y="476" text-anchor="middle">bound exceedance rate</text>
  <text class="t h" x="822" y="447" text-anchor="middle">Sensitivity</text><text class="t s" x="822" y="476" text-anchor="middle">decision vs radius</text>
  <path class="line" d="M238 370 V394 H822"/><path class="line" d="M722 370 V394"/><path class="line" d="M138 394 V414"/><path class="line" d="M366 394 V414"/><path class="line" d="M594 394 V414"/><path class="line" d="M822 394 V414"/>
</svg>
